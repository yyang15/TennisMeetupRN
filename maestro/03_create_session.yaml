appId: com.tennismeetup.app
---
# Create session flow
- tapOn: "Create Session"
- takeScreenshot: create_01_form
- tapOn:
    text: ".*morning.*"
- inputText: "Weekend Rally"
- tapOn: "Singles"
- tapOn:
    text: "Tomorrow.*"
    index: 0
- takeScreenshot: create_02_time
- scrollUntilVisible:
    element: "Green Lake Tennis Courts"
    direction: DOWN
- tapOn: "Green Lake Tennis Courts"
- scrollUntilVisible:
    element: "Intermediate"
    direction: DOWN
- tapOn: "Intermediate"
- tapOn: "2 players"
- takeScreenshot: create_03_filled
- scrollUntilVisible:
    element: "Publish Session"
    direction: DOWN
- tapOn: "Publish Session"
- takeScreenshot: create_04_published
