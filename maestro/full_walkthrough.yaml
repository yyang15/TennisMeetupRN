appId: com.tennismeetup.app
---
# TennisMeetup — Full App Walkthrough
# Handles both fresh app (onboarding) and returning user (discover)

# ── ONBOARDING (if needed) ──
- runFlow:
    when:
      visible: "Get Started"
    commands:
      - takeScreenshot: 00_onboarding
      - tapOn: "Name input"
      - inputText: "Test User"
      - tapOn: "Intermediate"
      - tapOn: "Location input"
      - inputText: "Seattle, WA"
      - tapOn: "Phone"
      - tapOn: "Contact input"
      - inputText: "2065551234"
      - scrollUntilVisible:
          element: "Get Started"
          direction: DOWN
      - takeScreenshot: 01_onboarding_filled
      - tapOn: "Get Started"

# ── DISCOVER ──
- extendedWaitUntil:
    visible: "Create.*"
    timeout: 30000
- takeScreenshot: 02_discover_home

- swipe:
    direction: UP
    duration: 1000
- takeScreenshot: 03_discover_scrolled
- swipe:
    direction: DOWN
    duration: 1000

# ── PROFILE ──
- tapOn:
    text: "Profile"
    optional: true
- takeScreenshot: 04_profile
- back
- extendedWaitUntil:
    visible: "Create.*"
    timeout: 5000

# ── VIEW SESSION ──
- tapOn:
    index: 0
    text: ".*left.*"
    optional: true
- takeScreenshot: 05_session_detail
- runFlow:
    when:
      visible: "Join Session"
    commands:
      - tapOn: "Join Session"
      - takeScreenshot: 06_joined
- back
- extendedWaitUntil:
    visible: "Create.*"
    timeout: 5000

# ── CREATE SESSION ──
- tapOn: "Create session"
- takeScreenshot: 07_create_form
- tapOn:
    text: ".*morning.*"
    optional: true
- inputText: "Weekend Rally"
- tapOn:
    text: "Singles"
    optional: true
- tapOn:
    text: "Tomorrow.*"
    index: 0
    optional: true
- takeScreenshot: 08_create_when
- swipe:
    direction: UP
    duration: 1000
- tapOn:
    text: "Green Lake.*"
    optional: true
- takeScreenshot: 09_create_court
- swipe:
    direction: UP
    duration: 1000
- tapOn:
    text: "Intermediate"
    optional: true
- tapOn:
    text: "2 players"
    optional: true
- takeScreenshot: 10_create_filled
- swipe:
    direction: UP
    duration: 1000
- tapOn:
    text: "Publish Session"
    optional: true
- takeScreenshot: 11_published

# ── END ──
- takeScreenshot: 12_final
