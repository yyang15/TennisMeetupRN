# Join session flow — assumes app is on Discover screen
---
# Tap first session card
- tapOn:
    text: "spot.*left"
    index: 0
- takeScreenshot: join_01_detail

# Join if available
- runFlow:
    when:
      visible: "Join Session"
    commands:
      - tapOn: "Join Session"
      - takeScreenshot: join_02_joined

# Go back
- back
